# Debug
DEBUG: false

# Topics used by `python app.py --all` (or DailyNewsCollector.exe --all)
# so a single scheduled run can produce several briefings.
TOPICS:
  - AI agents
  - large language models
  - local LLMs
  - cybersecurity
  - AI coding tools
  - open source
  - robotics
  - tech startups
  - web development
  - devops
  - data science
  - cloud computing

# Shared proxy for model/search/browse. Leave empty if not needed.
PROXY:

# Agently v4 model configuration.
#
# EASIEST: pick a preset and put the matching API key in .env — done.
#   preset: openai      -> OPENAI_API_KEY
#   preset: openrouter  -> OPENROUTER_API_KEY   (any model on openrouter.ai)
#   preset: groq        -> GROQ_API_KEY         (very fast Llama/Qwen)
#   preset: deepseek    -> DEEPSEEK_API_KEY
#   preset: together    -> TOGETHER_API_KEY
#   preset: ollama      -> no key needed        (local, default)
# `model:` overrides the preset's default model. Set AGENTLY_NEWS_MODEL in
# .env to switch models without editing this file.
#
# ADVANCED: skip `preset` and set base_url/auth yourself with `${ENV.xxx}`
# placeholders resolved from the environment or `.env`.
MODEL:
  provider: OpenAICompatible
  base_url: ${ENV.DEEPSEEK_BASE_URL}
  model: ${ENV.DEEPSEEK_DEFAULT_MODEL}
  model_type: chat
  auth:
    api_key: ${ENV.DEEPSEEK_API_KEY}
  request_options:
    temperature: 0.2
    extra_body:
      think: false
  # Presets to try in order when the primary model fails (outage, rate
  # limit, missing key). Each needs its own API key in .env; presets whose
  # key is missing are skipped automatically.
  # fallback_presets:
  #   - groq
  #   - openrouter

SEARCH:
  max_results: 10
  timelimit: d
  # region: set to match your preferred news source language.
  # Use "us-en" for English news, "cn-zh" for Chinese news, etc.
  # When output_language is Chinese, "cn-zh" returns better-matched results.
  region: us-en
  backend: yahoo
  # Optional RSS/Atom feeds used as an extra candidate pool next to the
  # search engine (more reliable, no rate limits). Keyword-matched per column.
  rss_feeds:
    - https://techcrunch.com/category/artificial-intelligence/feed/
    - https://www.theverge.com/rss/index.xml
    - https://feeds.arstechnica.com/arstechnica/index
    - https://www.wired.com/feed/rss
    - https://blog.google/technology/ai/rss/
    - https://openai.com/blog/rss.xml
    - https://www.anthropic.com/rss/feed.xml

BROWSE:
  enable_playwright: false
  playwright_headless: true
  # When direct browsing fails (bot walls, JS-only pages), retry through the
  # free Jina Reader proxy (https://r.jina.ai) to get clean markdown content.
  enable_jina_fallback: true
  response_mode: markdown
  max_content_length: 4000
  min_content_length: 80

WORKFLOW:
  max_column_num: 2
  max_news_per_column: 2
  output_language: English
  column_concurrency: 1
  summary_concurrency: 1

OUTLINE:
  use_customized: false
  customized:
    report_title: Today's News about Large Model Applications
    column_list:
      - column_title: Latest Launches
        column_requirement: Focus on newly announced or newly released large model applications in the last few days.
        search_keywords: large model application launch this week
      - column_title: Hot Topics
        column_requirement: Focus on the most discussed or fastest-growing large model applications.
        search_keywords: large model application trending news
      - column_title: Industry Moves
        column_requirement: Focus on enterprise adoption, funding, partnerships, or strategy shifts around large model applications.
        search_keywords: large model application enterprise partnership funding

OUTPUT:
  directory: outputs
  # Formats to save for each report. Markdown is always written.
  # Available: markdown, json, html
  formats:
    - markdown
    - json
    - html
  # Maintain outputs/INDEX.md with a link to every generated report.
  update_index: true
  # Maintain outputs/index.html, a browsable dashboard of all reports.
  # Also writes outputs/feed.xml, an RSS feed of the same catalog.
  update_dashboard: true
  # Absolute base URL used for links in outputs/feed.xml, e.g. your GitHub
  # Pages address. Falls back to the SITE_URL environment variable; when
  # empty, feed links stay relative.
  site_url: ""

SUMMARY:
  # Generate a "Key Takeaways" executive summary at the top of each report.
  enable_tldr: true

# Developer-pulse mode (`--dev` or the panel's dev button): pulls straight
# from GitHub trending/new repos, Hacker News, Reddit, Lobsters, dev.to,
# daily.dev, and Product Hunt with a conversational tone, no web search.
DEV_PULSE:
  # بخش‌های فعال — کدوم منبع‌ها چرخانده بشن.
  # مقادیر مجاز: trending, releases, security, hot_news, products, community
  # خالی یا حذف = همه فعال.
  enabled_sections: []
  reddit_subreddits:
    - programming
    - webdev
    - LocalLLaMA
    - MachineLearning
    - artificial
    - artificialintelligence
    - selfhosted
    - netsec
    - devops
    - ExperiencedDevs
    - rust
    - golang
    - reactjs
    - typescript
    - cscareerquestions
    - opensource
    - sideproject
  min_hn_points: 80
  min_reddit_score: 100
  min_lobsters_score: 10
  min_devto_reactions: 20
  min_dailydev_upvotes: 20
  # "GitHub Rising": repos gaining this many stars in ~24h count as rising,
  # even if they never reach the trending page (data: OSS Insight).
  min_rising_stars: 30
  # Extra RSS/Atom feeds merged into the "Community Buzz" column — the bridge
  # for anything without a public API (an X/Twitter account via RSSHub or
  # nitter, engineering blogs, newsletters...).
  extra_feeds:
    - https://simonwillison.net/atom/everything/
    - https://github.blog/feed/
    - https://stackoverflow.blog/feed/
    - https://newsletter.pragmaticengineer.com/feed
    - https://blog.rust-lang.org/feed.xml
    - https://deno.com/feed.xml
    - https://go.dev/blog/feed.atom
  #  - https://rsshub.app/twitter/user/OpenAI
  # Optional: limit GitHub trending/new to one language, e.g. python
  github_language:
  # "Fresh Releases" column: repos whose new releases you want summarized
  # (what changed / anything breaking / upgrade or wait). Empty list disables
  # the column. Set GITHUB_TOKEN in .env for higher API rate limits.
  watch_repos:
    - ollama/ollama
    - microsoft/vscode
    - python/cpython
    - nodejs/node
    - getcursor/cursor
    - anthropics/claude-code
    - ggml-org/llama.cpp
    - huggingface/transformers
    - openai/codex
    - google-gemini/gemini-cli
    - langchain-ai/langchain
    - langgenius/dify
    - n8n-io/n8n
    - vllm-project/vllm
    - microsoft/TypeScript
    - golang/go
    - rust-lang/rust
    - facebook/react
    - vercel/next.js
    - vitejs/vite
    - denoland/deno
    - astral-sh/ruff
    - astral-sh/uv
    - comfyanonymous/ComfyUI
    - anthropics/anthropic-cookbook
    - microsoft/autogen
    - crewAIInc/crewAI
    - hashicorp/terraform
    - neovim/neovim
    - zed-industries/zed
  release_window_days: 3
  # "Security Watch" column: package ecosystems to monitor for fresh
  # advisories (pip, npm, maven, nuget, rubygems, go, rust, composer...).
  # Empty list disables the column.
  security_ecosystems:
    - pip
    - npm
    - go
    - rust
    - maven
    - nuget
    - rubygems
    - pub
  security_min_severity: high
  # Your stack: when an item genuinely relates to it, the summary adds one
  # sentence on what it means for you. Leave empty to disable.
  stack: []
  #  - Python
  #  - FastAPI
  #  - React

HISTORY:
  # Remember published story URLs so consecutive runs skip stories that
  # already appeared in earlier reports. With --allow-repeats (or
  # filter_repeats: false) repeated stories are kept in the report but
  # flagged, so fresh ones get a NEW badge.
  enabled: true
  retention_days: 30
  path: outputs/.history.json
  filter_repeats: true

DELIVERY:
  telegram:
    # Send the report to a Telegram chat after generation.
    # Create a bot with @BotFather, then set the env vars referenced below.
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    # channel = news-channel feel: opening headlines post, then one post per
    #           story (with photo when available), then a closing stats post.
    # digest  = the old compact multi-story messages.
    send_style: channel
    # Pause between channel-style posts, in seconds.
    message_delay: 1.8
    # Also attach the standalone HTML report as a document.
    send_html_file: true
  webhook:
    # POST the report JSON (title, tldr, columns, markdown) to any URL.
    enabled: false
    url: ${NEWS_WEBHOOK_URL}
